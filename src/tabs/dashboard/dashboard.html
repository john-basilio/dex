<div class="dashboard__grid">
  <div class="panel panel--distro">
    <div class="panel__header">
      <span class="panel__title">Distro Detected</span>
    </div>
    <div class="distro">
      <div class="distro__logo"> <img src="/assets/default.svg" alt="Unknown distribution"></div>
      <div class="distro__text">
        <span class="distro__name">Unknown distribution</span>
        <span class="distro__detail">Unknown package manager</span>
      </div>
    </div>
  </div>

  <div class="panel panel--stats">
    <div class="panel__header">
      <span class="panel__title">System Stats</span>
      <span class="panel__icon"></span>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat__label-row">
          <span class="stat__label">CPU</span>
          <span class="stat__value">18%</span>
        </div>
        <div class="stat__bar">
          <div class="stat__bar-fill stat__bar-fill--cpu" style="width: 18%"></div>
        </div>
      </div>
      <div class="stat">
        <div class="stat__label-row">
          <span class="stat__label">Memory</span>
          <span class="stat__value">3.5 GB / 16 GB</span>
        </div>
        <div class="stat__bar">
          <div class="stat__bar-fill stat__bar-fill--mem" style="width: 22%"></div>
        </div>
      </div>
      <div class="stat">
        <div class="stat__label-row">
          <span class="stat__label">Disk</span>
          <span class="stat__value">102 GB / 500 GB</span>
        </div>
        <div class="stat__bar">
          <div class="stat__bar-fill stat__bar-fill--disk" style="width: 20%"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="panel panel--terminal">
  <div class="panel__header">
    <span class="panel__title">Which package would you like to manage?</span>
    <button class="pill-button">Recent</button>
  </div>
  <div class="terminal">
    <ol class="terminal__list">
      <li><span class="terminal__prefix">1.</span> <span class="terminal__keyword">dex</span> install neovim</li>
      <li><span class="terminal__prefix">2.</span> <span class="terminal__keyword">dex</span> search neofetch</li>
      <li><span class="terminal__prefix">3.</span> <span class="terminal__keyword">dex</span> remove htop</li>
    </ol>
  </div>
</div>



<div class="panel panel--actions">
  <div class="panel__header">
    <span class="panel__title">Quick Actions</span>
    <span class="panel__chevron">▾</span>
  </div>
  <div class="actions">
    <button class="action-button">
      <span class="action-button__icon"></span>
      <span class="action-button__label">Update All</span>
    </button>
    <button class="action-button">
      <span class="action-button__icon"></span>
      <span class="action-button__label">Clean Cache</span>
    </button>
    <button class="action-button">
      <span class="action-button__icon"></span>
      <span class="action-button__label">Check Services</span>
    </button>
  </div>
</div>

<script type="module" src="/tabs/dashboard/dashboard.js"></script>
