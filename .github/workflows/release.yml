name: Build Linux Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
      - "*.*.*-*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm install
        working-directory: ./src

      - name: Build frontend
        run: npm run build
        working-directory: ./src

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build bundles
        run: cargo tauri build
        env:
          NO_STRIP: 'true'

      - name: Generate SHA256
        run: |
          cd src-tauri/target/release/bundle
          find . -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -print0 | xargs -0 sha256sum > SHA256SUMS.txt
          if [ ! -s SHA256SUMS.txt ]; then
            echo "ERROR: No build artifacts found"
            exit 1
          fi

      - name: Get last commit message
        id: get_last_commit
        run: |
          MESSAGE=$(git log -1 --pretty=%B)
          if [ -z "$MESSAGE" ]; then
            echo "ERROR: Last commit message is empty. Cannot create release notes."
            exit 1
          fi
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Generate GPG signatures
        run: |
          cd src-tauri/target/release/bundle
          find . -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -print0 | xargs -0 -I {} gpg --detach-sign --armor "{}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            src-tauri/target/release/bundle/*.AppImage
            src-tauri/target/release/bundle/*.deb
            src-tauri/target/release/bundle/*.rpm
            src-tauri/target/release/bundle/SHA256SUMS.txt
            src-tauri/target/release/bundle/*.asc
          body: ${{ steps.get_last_commit.outputs.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}